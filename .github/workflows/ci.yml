name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      # Compiles the full module graph to Hermes bytecode — catches broken
      # imports and bundler-level errors that tsc and jest cannot see.
      - name: Bundle check (Android)
        run: npx expo export --platform android --output-dir /tmp/export-ci
